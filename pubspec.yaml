name: online_hospital  # Project names must be lowercase with underscores
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.2
  flutter_staggered_animations: ^1.1.1
  intl: ^0.20.2
  http: ^1.3.0
  flutter_launcher_icons: ^0.14.3
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  google_sign_in: ^6.3.0
  flutter_facebook_auth: ^7.1.1
  sign_in_with_apple: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icons.jpg"
  adaptive_icon_background: "#FFFFFF"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/icons.jpg
    - assets/doctor3.jpg
    - assets/doctor4.jpg
    - assets/mri.jpg
    - assets/ct.jpg
    - assets/blood_test.jpg
    - assets/thyroid.jpg
    - assets/private_room.jpg
    - assets/surgery.jpg
